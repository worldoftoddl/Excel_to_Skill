<!DOCTYPE html>
<html lang="ko">
<head><meta charset="utf-8">
<style>table{border-collapse:collapse}td{border:1px solid #ddd;padding:2px 6px;vertical-align:top}.b{font-weight:bold}.bd{outline:1px solid #333}.truncated td{text-align:center;color:#888;font-style:italic}</style>
</head>
<body>
<table data-sheet="Data">
<tr><td data-cell="A1" colspan="2">매출 요약</td></tr>
<tr><td data-cell="A2">1분기</td><td data-cell="B2">100</td></tr>
<tr><td data-cell="A3">2분기</td><td data-cell="B3">200</td></tr>
<tr><td data-cell="A4">증가</td><td data-cell="B4" data-formula="B3-B2">[수식: =B3-B2]</td></tr>
<tr><td data-cell="A5">합계</td><td data-cell="B5" data-formula="SUM(B2:B3)">[수식: =SUM(B2:B3)]</td></tr>
</table>
</body>
</html>
